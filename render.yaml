# Render Blueprint — DashZen API (Option 3: PaaS split)
# https://render.com/docs/blueprint-spec
#
# First-time setup:
#   1. Create Neon Postgres → copy DATABASE_URL (postgresql+asyncpg://…?sslmode=require)
#   2. Render Dashboard → New → Blueprint → connect this repo
#   3. Set sync:false env vars below (JWT, LLM keys, CORS, public URLs, Google OAuth)
#   4. After deploy, set API_PUBLIC_URL to the service URL shown in Render
#   5. Google OAuth: set GOOGLE_* + STUDIO_PUBLIC_URL; register redirect URI in Google Console:
#      https://<studio-domain>/api/v1/auth/google/callback (Vercel proxy — recommended)

services:
  - type: web
    name: dashzen-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: EMAIL_BACKEND
        value: console
      - key: LLM_PROVIDER
        value: ollama
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      - key: REFRESH_COOKIE_PATH
        value: /api/v1/auth
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: AVATAR_STORAGE_DIR
        value: /app/data/avatars
      # ── Set in Render dashboard (Blueprint cannot store secrets) ──
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── Google OAuth (set secrets in Render dashboard) ──
      - key: GOOGLE_OAUTH_ENABLED
        value: "true"
      - key: OAUTH_STATE_TTL_SECONDS
        value: "600"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Vercel same-origin proxy callback (recommended for auth cookies):
      # https://<your-studio>.vercel.app/api/v1/auth/google/callback
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Studio URL for post-login redirect (e.g. https://dashzen-mu.vercel.app)
      - key: STUDIO_PUBLIC_URL
        sync: false
      # Optional: restrict to Google Workspace domain
      # - key: GOOGLE_HD
      #   sync: false
      # Optional: Upstash Redis for multi-instance rate limits / streams
      # - key: REDIS_URL
      #   sync: false
