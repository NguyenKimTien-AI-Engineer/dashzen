[project]
name = "core"
version = "0.1.0"
description = "DashZen core — LLM, schemas, config"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "httpx>=0.28",
    "pyjwt[crypto]>=2.9",
    "bcrypt>=4.2",
    "email-validator>=2.2",
    "aiosmtplib>=3.0",
    "anthropic>=0.40",
    "openai>=1.55",
    "pyyaml>=6.0",
    "authlib>=1.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
