[project]
name = "eval"
version = "0.1.0"
description = "DashZen eval — golden test sets"
requires-python = ">=3.12"
dependencies = [
    "core",
    "agents",
    "pytest>=8.0",
]

[tool.uv.sources]
core = { workspace = true }
agents = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval"]
