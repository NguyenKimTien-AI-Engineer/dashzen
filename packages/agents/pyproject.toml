[project]
name = "agents"
version = "0.1.0"
description = "DashZen agent runtime — 11 subsystems"
requires-python = ">=3.12"
dependencies = [
    "core",
    "tools",
    "db",
]

[tool.uv.sources]
core = { workspace = true }
tools = { workspace = true }
db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]
