[project]
name = "db"
version = "0.1.0"
description = "DashZen persistence — SQLAlchemy models"
requires-python = ">=3.12"
dependencies = [
    "core",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/db"]
