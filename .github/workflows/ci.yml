# CI — lint and test on every PR and push to main/develop.
# Optimized for the uv monorepo + Next.js Studio (PaaS deploy target: Vercel + Render/Fly).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  # Python test defaults (match apps/api/tests/conftest.py)
  DATABASE_URL: postgresql+asyncpg://dashzen:dashzen@localhost:5432/dashzen
  JWT_SECRET_KEY: test-secret-key-for-pytest-only-32b!
  RATE_LIMIT_ENABLED: "false"
  EMAIL_BACKEND: console
  AVATAR_STORAGE_DIR: /tmp/dashzen-test-avatars
  LLM_PROVIDER: gemini
  APP_SECRET_KEY: ci-app-secret
  APP_ENV: test

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      studio: ${{ steps.filter.outputs.studio }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'apps/api/**'
              - 'packages/**'
              - 'pyproject.toml'
              - 'uv.lock'
            studio:
              - 'apps/studio/**'

  python-lint:
    name: Python lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --all-packages --group dev

      - name: Ruff check
        run: uv run ruff check apps packages

      - name: Ruff format
        run: uv run ruff format --check apps packages

  python-test:
    name: Python tests
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dashzen
          POSTGRES_PASSWORD: dashzen
          POSTGRES_DB: dashzen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashzen -d dashzen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --all-packages --group dev

      - name: Pytest
        run: uv run pytest --tb=short -q

  studio:
    name: Studio (Next.js)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.studio == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/studio
    env:
      NEXT_PUBLIC_API_URL: https://api.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
