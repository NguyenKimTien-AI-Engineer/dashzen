# Playwright smoke — public Studio routes (no secrets required).
# Auth E2E: add E2E_EMAIL / E2E_PASSWORD secrets and run workflow_dispatch.

name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    branches: [main]
    paths:
      - "apps/studio/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_API_URL: http://localhost:8000
  PLAYWRIGHT_BASE_URL: http://localhost:3000
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  smoke-public:
    name: Playwright public smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Studio
        run: npm run build

      - name: Start Studio
        run: |
          npm run start &
          echo "STUDIO_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 45); do
            curl -sf http://localhost:3000/login && exit 0
            sleep 2
          done
          echo "Studio failed to start"
          exit 1

      - name: Run public route tests
        run: npx playwright test e2e/smoke.spec.ts --grep "public routes"
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"

      - name: Stop Studio
        if: always()
        run: kill "$STUDIO_PID" 2>/dev/null || true
